name: Release

on:
  push:
    tags:
      # Numeric version tags: 0.1.0, 0.2.0, 1.10.3, etc.
      - "[0-9]+.[0-9]+.[0-9]+"

# OIDC Trusted Publishing: no NPM_TOKEN needed.
# GitHub Actions generates an OIDC token that NPM verifies
# against the Trusted Publisher configuration on the package.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # The prebuild hook runs version-sync.mjs automatically.
        # On a tag checkout the git HEAD is detached, so version-sync
        # exits early and the committed package.json version is used.
        run: pnpm run build

      - name: Publish to NPM (OIDC Trusted Publishing)
        # No NPM_TOKEN env var — OIDC handles authentication.
        # Requires Trusted Publisher configured on npmjs.com:
        #   https://www.npmjs.com/package/@primebrick/dal-pg/access
        # Repository: michaelsogos/primebrick-v3-dal
        # Workflow: .github/workflows/release.yml
        run: npm publish --access public --provenance
