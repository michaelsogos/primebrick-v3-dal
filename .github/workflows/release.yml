name: Release

on:
  push:
    tags:
      # Numeric version tags: 0.1.0, 0.2.0, 1.10.3, etc.
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # The prebuild hook runs version-sync.mjs automatically.
        # On a tag checkout the git HEAD is detached, so version-sync
        # exits early and the committed package.json version is used.
        run: pnpm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
